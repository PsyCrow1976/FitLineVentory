services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitlineventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitlineventory}
      POSTGRES_DB: ${POSTGRES_DB:-fitlineventory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitlineventory} -d ${POSTGRES_DB:-fitlineventory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://fitlineventory:fitlineventory@db:5432/fitlineventory}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://192.168.1.130:8080}
      REORDER_LOOKBACK_DAYS: ${REORDER_LOOKBACK_DAYS:-30}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local